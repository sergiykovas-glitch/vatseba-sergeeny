<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; media-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests" />
  <title>404 — Vatseba Sergeeny</title>

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inclusive+Sans:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- same looping background as the main site (still frame until the .mp4 exists) -->
  <video class="bgvid" autoplay muted loop playsinline poster="assets/bg-poster.png">
    <source src="assets/bg-loop-mobile.mp4" type="video/mp4" />
  </video>
  <div class="vignette"></div>

  <main class="err-page">
    <div class="err">
      <span class="err-404" aria-hidden="true">404</span>
      <p class="err-msg">This track doesn’t exist</p>
      <a class="back" href="/">← Back to music</a>
    </div>
  </main>
</body>
</html>
